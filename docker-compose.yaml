services:
  pkg-by-feature-app:
    container_name: pkg-by-feature-app
    build:
      context: ./pkg-by-feature
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./pkg-by-feature:/app
    networks:
      - clean-go
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d example"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=example
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - clean-go

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - ./pgadmin_servers.json:/pgadmin4/servers.json
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - clean-go
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d example"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    
volumes:
  db-data:
  pgadmin-data:
    
networks:
  clean-go: